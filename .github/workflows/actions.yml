---
name: Unified GitHub Profile Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/daily_update.py'
      - 'scripts/github_stats_updater.py'
      - '.github/workflows/actions.yml'
      - 'README.md'

jobs:
  profile-update:
    name: GitHub Profile Update
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN || github.token }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git config --local pull.rebase false

      - name: Verify README Structure
        run: |
          echo "Checking README.md structure..."
          grep -q "<!--PROFILE_VIEWS-->" README.md
          grep -q "<!--FOLLOWERS-->" README.md
          grep -q "<!--TOTAL_STARS-->" README.md
          grep -q "<!--CURRENT_STREAK-->" README.md
          grep -q "assets/achievements/qwen-image-third-prize-leaderboard.png" README.md
          echo "README.md structure verification completed"

      - name: Run GitHub Stats Updater
        run: |
          cd scripts
          python github_stats_updater.py
          cd ..
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Daily Update Script
        run: |
          cp README.md scripts/README.md
          cd scripts
          python daily_update.py
          cd ..
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUSH_CHANGES: 'false'

      - name: Final README Verification
        run: |
          echo "Final README.md structure verification..."
          grep -q "<!--PROFILE_VIEWS-->" README.md
          grep -q "<!--FOLLOWERS-->" README.md
          grep -q "<!--TOTAL_STARS-->" README.md
          grep -q "<!--CURRENT_STREAK-->" README.md
          grep -q "assets/achievements/qwen-image-third-prize-leaderboard.png" README.md
          echo "Final README.md structure verification completed"

      - name: Commit & Push Changes
        run: |
          git add .
          git status
          if ! git diff --staged --quiet; then
            git commit -m "Daily profile update - $(date +%Y-%m-%d)" \
              -m "Refreshed profile statistics" \
              -m "Updated daily inspirational quote" \
              -m "Automated maintenance completed"
            git push
            echo "Successfully committed and pushed changes"
          else
            echo "No changes to commit"
          fi
        continue-on-error: true

      - name: Upload Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: daily-update-logs
          path: |
            daily_update.log
            scripts/daily_update.log
            scripts/github_stats.log
          retention-days: 7
